<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Basketball Display</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden;
    background: radial-gradient(circle at center, #11124a 0%, #06062a 55%, #010118 100%);
    font-family: Arial, sans-serif; }
  body { display:flex; align-items:center; justify-content:center; }

  .board {
    width:100vw; height:100vh; border-radius:0;
    border:none;
    background: linear-gradient(180deg, rgba(20,20,80,.55), rgba(5,5,35,.72));
    box-shadow: none;
    padding:3vh 3vw; display:flex; flex-direction:column;
    justify-content:space-between; position:relative;
  }
  .top-bar { display:grid; grid-template-columns: 1fr 1.4fr 1fr; align-items:center; }
  .quarter { font-size:5.5vw; font-weight:900; color:#ffd400;
    text-shadow:0 0 18px rgba(255,212,0,.65); justify-self:start; padding-left:1vw; }
  .main-clock { justify-self:center; font-size:12vw; font-weight:900; color:#fff;
    line-height:1; letter-spacing:.06em;
    text-shadow: 0 0 12px rgba(255,255,255,.75), 0 0 28px rgba(255,255,255,.28);
    font-variant-numeric: tabular-nums; }
  .shot-wrap { justify-self:end; text-align:center; padding-right:1vw; }
  .shot-label { font-size:3vw; font-weight:900; color:#bcbcbc; margin-bottom:.3vh; }
  .shot-clock { font-size:8vw; font-weight:900; color:#00ff9a;
    text-shadow: 0 0 18px rgba(0,255,154,.55), 0 0 30px rgba(0,255,154,.25);
    font-variant-numeric: tabular-nums; }
  .shot-clock.danger { color:#ff4040;
    text-shadow: 0 0 18px rgba(255,64,64,.8), 0 0 32px rgba(255,64,64,.4);
    animation: blinkDanger .45s infinite; }
  @keyframes blinkDanger { 0%,100%{opacity:1} 50%{opacity:.45} }
  .teams-row { flex:1; display:grid; grid-template-columns: 1fr 2px 1fr;
    align-items:center; gap:2vw; margin-top:1vh; }
  .divider { width:2px; height:60%;
    background:linear-gradient(180deg,transparent,rgba(255,255,255,.15),transparent);
    justify-self:center; }
  .team { display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:1vh; }
  .team-name { font-size:6vw; font-weight:900; letter-spacing:.06em;
    text-transform:uppercase; white-space:nowrap; max-width:40vw;
    overflow:hidden; text-overflow:ellipsis; }
  .team1 .team-name { color:#57a8ff; text-shadow:0 0 18px rgba(87,168,255,.55); }
  .team2 .team-name { color:#ff6b47; text-shadow:0 0 18px rgba(255,107,71,.55); }
  .score { font-size:22vw; line-height:1; font-weight:900; font-variant-numeric:tabular-nums; }
  .team1 .score { color:#4b9bf0;
    text-shadow: 0 0 20px rgba(75,155,240,.55), 0 0 42px rgba(75,155,240,.18); }
  .team2 .score { color:#ff6848;
    text-shadow: 0 0 20px rgba(255,104,72,.55), 0 0 42px rgba(255,104,72,.18); }
  .bottom-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; margin-top:1vh; }
  .fouls { font-size:4vw; font-weight:900; color:#fff;
    text-transform:uppercase; padding:0 1.2vw; }
  .fouls span { color:#ffd400; }
  .fouls.right { text-align:right; }
  .foul-arrow-wrap { display:flex; align-items:center; justify-content:center; gap:1.5vw; padding:0 1vw; }
  .farr { width:0; height:0; border-top:3vw solid transparent; border-bottom:3vw solid transparent; opacity:0; transition:opacity .3s, filter .3s; }
  .farr.left  { border-right:5vw solid #ff2200; }
  .farr.right { border-left:5vw solid #ff2200; }
  .farr.on { opacity:1; filter:drop-shadow(0 0 14px #ff2200); }

  #winner-photo-overlay { display:none; position:fixed; inset:0; background:#000;
    z-index:9999; align-items:center; justify-content:center; }
  #winner-photo-overlay.show { display:flex; }
  #winner-photo-img { width:100vw; height:100vh; object-fit:cover; }
  #winner-photo-text { position:absolute; left:0; right:0; bottom:4vh; text-align:center;
    font-size:5vw; font-weight:900; color:#fff; text-transform:uppercase;
    letter-spacing:.08em;
    text-shadow: 0 0 15px #000, 0 0 30px #000, 0 0 50px #000; }

  /* ══ BRAVO OVERLAY ══════════════════════════════════ */
  #bravo-overlay { display:none; position:fixed; inset:0; z-index:5000;
    align-items:center; justify-content:center; overflow:hidden;
    background: transparent; }
  #bravo-overlay.show { display:flex; }

  #bravo-strobe { position:absolute; inset:0;
    animation: strobeAnim .3s steps(1) infinite; pointer-events:none; }
  @keyframes strobeAnim {
    0%  { background:#ff000033; }
    17% { background:#ff880033; }
    34% { background:#ffff0033; }
    51% { background:#00ff8833; }
    68% { background:#0088ff33; }
    85% { background:#aa00ff33; }
  }

  #bravo-content { position:relative; z-index:2; text-align:center; width:100%; }

  #bravo-word {
    font-size:28vw; font-weight:900; line-height:.9;
    background: linear-gradient(90deg,#ff0000,#ff8800,#ffee00,#00ff55,#00cfff,#aa00ff,#ff00bb,#ff0000);
    background-size:300% 100%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation: bravoColors .5s linear infinite, bravoScale 1.1s ease-in-out infinite;
    filter: drop-shadow(0 0 25px #fff8) drop-shadow(0 0 50px #ff08);
  }
  @keyframes bravoColors {
    0%  { background-position:0% 50%; }
    100%{ background-position:300% 50%; }
  }
  @keyframes bravoScale {
    0%,100%{ transform: scale(1)    rotate(-1.5deg); }
    50%    { transform: scale(1.07) rotate(1.5deg);  }
  }

  #bravo-team {
    font-size:7vw; font-weight:900; color:#fff; letter-spacing:.15em;
    text-shadow: 0 0 25px #ff0, 0 0 50px #f80, 0 0 80px #f00;
    animation: teamPulse .9s ease-in-out infinite alternate;
  }
  @keyframes teamPulse {
    0%  { transform:scale(1);    opacity:.8; }
    100%{ transform:scale(1.07); opacity:1;  }
  }

  .bstar { position:absolute; animation: starFly 2.2s ease-in infinite; opacity:0; pointer-events:none; }
  @keyframes starFly {
    0%  { transform:translateY(0)    scale(.6) rotate(0deg);   opacity:1; }
    100%{ transform:translateY(-95vh) scale(1.6) rotate(400deg); opacity:0; }
  }

  @media(max-width:900px){
    .board{height:78vh} .quarter{font-size:6vw} .main-clock{font-size:12vw}
    .shot-label{font-size:3vw} .shot-clock{font-size:8vw}
    .team-name{font-size:6vw;max-width:38vw} .score{font-size:22vw}
    .fouls{font-size:4vw} #winner-photo-text{font-size:7vw}
    #bravo-word{font-size:38vw}
    #bravo-team{font-size:10vw}
  }
</style>
</head>
<body>

<div class="board">
  <div class="top-bar">
    <div class="quarter" id="qtr-display">1st</div>
    <div class="main-clock" id="main-clock">10:00</div>
    <div class="shot-wrap">
      <div class="shot-label">SHOT</div>
      <div class="shot-clock" id="shot-clock">24.0</div>
    </div>
  </div>
  <div class="teams-row">
    <div class="team team1">
      <div class="team-name" id="tn1">TEAM 1</div>
      <div class="score" id="sc1">0</div>
    </div>
    <div class="divider"></div>
    <div class="team team2">
      <div class="team-name" id="tn2">TEAM 2</div>
      <div class="score" id="sc2">0</div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="fouls">FOULS: <span id="f1">0</span></div>
    <div class="foul-arrow-wrap">
      <div class="farr left"  id="dispArrowL"></div>
      <div class="farr right" id="dispArrowR"></div>
    </div>
    <div class="fouls right">FOULS: <span id="f2">0</span></div>
  </div>
</div>

<div id="winner-photo-overlay">
  <img id="winner-photo-img" alt="Winner Photo">
  <div id="winner-photo-text"></div>
</div>

<div id="bravo-overlay">
  <div id="bravo-strobe"></div>
  <div id="bravo-content">
    <div id="bravo-word">BRAVO!</div>
    <div id="bravo-team"></div>
  </div>
</div>

// ── نجوم طائرة ────────────────────────────────────────
function spawnStars(ov) {
  ov.querySelectorAll('.bstar').forEach(s => s.remove());
  const emojis = ['🎉','⭐','🌟','✨','🎊','💥','🔥','🏆','🎶','💫'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'bstar';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left             = Math.random() * 100 + 'vw';
    s.style.bottom           = '-5vh';
    s.style.fontSize         = (3 + Math.random() * 5).toFixed(1) + 'vw';
    s.style.animationDelay    = (Math.random() * 2).toFixed(2) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 1.2).toFixed(2) + 's';
    ov.appendChild(s);
  }
}

let mainMs = 0, mainRunning = false, mainPrevRaf = null;
let shotMs = 0, shotRunning = false, shotPrevRaf = null;

function fmtMain(ms) {
  const sec = Math.max(0, Math.floor(ms / 1000));
  return Math.floor(sec/60) + ':' + String(sec%60).padStart(2,'0');
}
function fmtShot(ms) {
  ms = Math.max(0, ms);
  return String(Math.floor(ms/1000)).padStart(2,'0') + '.' + Math.floor((ms%1000)/100);
}

function syncFromFirebase(d) {
  const now = Date.now() + window._serverOffset;
  if (d.mainRunning && d.serverStartTime && d.mainDuration) {
    mainMs = Math.max(0, d.mainDuration * 1000 - (now - d.serverStartTime));
    mainRunning = mainMs > 0;
  } else {
    mainMs = (d.mainSec ?? 0) * 1000;
    mainRunning = false;
  }
  if (d.shotRunning && d.serverShotStartTime && d.shotDurationMs) {
    shotMs = Math.max(0, d.shotDurationMs - (now - d.serverShotStartTime));
    shotRunning = shotMs > 0;
  } else {
    shotMs = ((d.shot ?? 0) * 1000) + (d.shotMs ?? 0);
    shotRunning = false;
  }
  mainPrevRaf = null;
  shotPrevRaf = null;
}

function rafLoop(now) {
  if (mainRunning) {
    if (mainPrevRaf !== null) {
      mainMs = Math.max(0, mainMs - (now - mainPrevRaf));
      if (mainMs === 0) mainRunning = false;
    }
    mainPrevRaf = now;
  }
  if (shotRunning) {
    if (shotPrevRaf !== null) {
      shotMs = Math.max(0, shotMs - (now - shotPrevRaf));
      if (shotMs === 0) shotRunning = false;
    }
    shotPrevRaf = now;
  }
  document.getElementById('main-clock').textContent = fmtMain(mainMs);
  const shotEl = document.getElementById('shot-clock');
  shotEl.textContent = fmtShot(shotMs);
  shotEl.classList.toggle('danger', shotMs < 5000);
  requestAnimationFrame(rafLoop);
}
requestAnimationFrame(rafLoop);

// ── Firebase ──────────────────────────────────────────
if (db) {
  db.ref('/.info/serverTimeOffset').on('value', s => {
    window._serverOffset = s.val() || 0;
  });

  db.ref('/live').on('value', snap => {
    const d = snap.val();
    if (!d) return;
    syncFromFirebase(d);
    document.getElementById('sc1').textContent = d.sc1 ?? 0;
    document.getElementById('sc2').textContent = d.sc2 ?? 0;
    document.getElementById('tn1').textContent = d.tn1 ?? 'TEAM 1';
    document.getElementById('tn2').textContent = d.tn2 ?? 'TEAM 2';
    document.getElementById('f1').textContent  = d.f1  ?? 0;
    document.getElementById('f2').textContent  = d.f2  ?? 0;
    const fa = d.foulArrow ?? 0;
    document.getElementById('dispArrowL').classList.toggle('on', fa===1);
    document.getElementById('dispArrowR').classList.toggle('on', fa===2);
    document.getElementById('qtr-display').textContent =
      QTR_LABELS[parseInt(d.qtr||1,10)] || '1st';
  });

  db.ref('/winner_photo').on('value', snap => {
    const d=snap.val(), ov=document.getElementById('winner-photo-overlay'),
          img=document.getElementById('winner-photo-img'),
          txt=document.getElementById('winner-photo-text');
    if (!d||!d.active||!d.photo){
      ov.classList.remove('show'); img.removeAttribute('src'); txt.textContent=''; return;
    }
    img.src=d.photo; txt.textContent=d.winner||''; ov.classList.add('show');
  });

  // ── Bravo ─────────────────────────────────────────
  db.ref('/bravo').on('value', snap => {
    const d   = snap.val();
    const ov  = document.getElementById('bravo-overlay');

    if (!d || !d.active) {
      ov.classList.remove('show');
      bravoAudio.pause();
      bravoAudio.currentTime = 0;
      ov.querySelectorAll('.bstar').forEach(s => s.remove());
      bravoBusy = false;
      return;
    }

    if (bravoBusy) return;
    bravoBusy = true;

    document.getElementById('bravo-team').textContent = d.teamName || '';
    spawnStars(ov);
    ov.classList.add('show');

    bravoAudio.currentTime = 0;
    bravoAudio.play().catch(() => {});

    setTimeout(() => {
      ov.classList.remove('show');
      bravoAudio.pause();
      bravoAudio.currentTime = 0;
      ov.querySelectorAll('.bstar').forEach(s => s.remove());
      bravoBusy = false;
    }, 5000);
  });
}

// ── Wake / Sync ───────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible' || !db) return;
  db.ref('/.info/serverTimeOffset').once('value', s => {
    window._serverOffset = s.val() || 0;
    db.ref('/live').once('value', s2 => {
      if (s2.val()) syncFromFirebase(s2.val());
    });
  });
  requestWakeLock();
});

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e){}
  }
}
requestWakeLock();

// ── YouTube Music ──
let ytPlayer = null;
let ytReady = false;
let pendingYt = null;

(function(){
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, fs: 0, rel: 0, iv_load_policy: 3 },
    events: {
      onReady: () => {
        ytReady = true;
        if (pendingYt) { ytPlayer.loadVideoById(pendingYt); pendingYt = null; }
      }
    }
  });
};

function playYt(videoId) {
  if (!videoId) { stopYt(); return; }
  if (ytReady && ytPlayer) {
    ytPlayer.loadVideoById(videoId);
  } else {
    pendingYt = videoId;
  }
}

function stopYt() {
  if (ytReady && ytPlayer) ytPlayer.stopVideo();
  pendingYt = null;
}

if (db) {
  db.ref('music').on('value', snap => {
    const m = snap.val();
    if (m && m.active && m.ytId) playYt(m.ytId);
    else stopYt();
  });
}
</script>
